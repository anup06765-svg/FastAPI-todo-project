<!DOCTYPE html>
<html>

<head>

<title>Edit Task</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1>Edit Task</h1>

<form class="edit-form" action="/update/{{ task.id }}" method="post">

<input
type="text"
name="title"
value="{{ task.title }}">

<select name="priority">

<option value="High"

{% if task.priority=="High" %}

selected

{% endif %}>

High

</option>

<option value="Medium"

{% if task.priority=="Medium" %}

selected

{% endif %}>

Medium

</option>

<option value="Low"

{% if task.priority=="Low" %}

selected

{% endif %}>

Low

</option>

</select>

<br><br>

<select name="category">

<option value="Study"

{% if task.category=="Study" %}

selected

{% endif %}>

Study

</option>

<option value="Office"

{% if task.category=="Office" %}

selected

{% endif %}>

Office

</option>

<option value="Personal"

{% if task.category=="Personal" %}

selected

{% endif %}>

Personal

</option>

</select>

<br><br>

<input

type="date"

name="due_date"

value="{{task.due_date}}">

<br><br>

<label>

<input
type="checkbox"
name="completed"

{% if task.completed %}
checked
{% endif %}

>

Completed

</label>

<br><br>

<button type="submit">

Update

</button>

</form>

</div>

</body>

</html>
