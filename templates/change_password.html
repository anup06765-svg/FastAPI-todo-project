<!DOCTYPE html>
<html>

<head>

    <title>Change Password</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1>Change Password</h1>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

{% if success %}

<p class="success">

{{ success }}

</p>

{% endif %}

<form class="edit-form"
action="/profile/password"
method="post">

<input
type="password"
name="current_password"
placeholder="Current Password"
required>

<input
type="password"
name="new_password"
placeholder="New Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<button type="submit">

Change Password

</button>

</form>

<br>

<a href="/profile">

Back to Profile

</a>

</div>

</body>

</html>
