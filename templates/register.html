<!DOCTYPE html>

<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1>User Registration</h1>
{% if error %}
<p class="error">
    {{ error }}
</p>
{% endif %}
<form class="edit-form" action="/register" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

<br>

<p>

Already have an account?

<a href="/login">

Login

</a>

</p>

</div>

</body>

</html>
