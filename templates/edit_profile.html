<!DOCTYPE html>
<html>

<head>

    <title>Edit Profile</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1>Edit Profile</h1>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

<form class="edit-form"
action="/profile/edit"
method="post">

<input
type="text"
name="username"
value="{{ user.username }}"
required>

<input
type="email"
name="email"
value="{{ user.email }}"
required>

<button type="submit">

Save Changes

</button>

</form>

<br>

<a href="/profile">

Back to Profile

</a>

</div>

</body>

</html>
